# 工程基线 CI:每次推送/PR 在干净环境验证 frozen-lockfile 安装、lint、typecheck、
# build 与核心 verify 套件。verify 在全新 SQLite 库(prisma db push)上自建测试数据、
# 自清理;PDF 导出验证依赖系统 CJK 字体(fonts-noto-cjk)。
#
# 注意:不在 CI 中放任何真实凭证;FILE_SIGNING_SECRET 为 CI 专用测试值,
# FILE_STORAGE_DRIVER 强制 local,绝不触达生产 COS。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      # C-2D 会员资产 E2E（verify:member-assets-c2d）需要 Redis：
      # 短信验证码 / 频控 / 会员会话全部落 Redis（dev SMS provider = log）。
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: file:./prisma/dev.db
      FILE_SIGNING_SECRET: ci-only-test-signing-secret-0123456789abcdef
      FILE_STORAGE_DIR: /tmp/ci-file-storage
      FILE_STORAGE_DRIVER: local
      AI_PROVIDER: mock
      # 以下均为 CI 专用测试值，不是真实凭证
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdef
      SECRET_ENCRYPTION_KEY: ci-only-encryption-key-0123456789abcdef
      REDIS_URL: redis://127.0.0.1:6379
      SMS_PROVIDER: log
      # terminals.service 在模块加载期 requireEnv 这两项（verify 启动完整 AppModule 需要）
      TERMINAL_ADMIN_SECRET: ci-only-terminal-admin-secret
      TERMINAL_ACTION_TOKEN_SECRET: ci-only-terminal-action-secret
    steps:
      - uses: actions/checkout@v4

      - name: Guard — no tracked AI tool state
        # 防止 .ccg/tasks 等 AI 工具临时状态被(强制)提交回库；.ccg/spec 正式规范不在此列。
        run: |
          tracked=$(git ls-files .ccg/tasks .ccg/commander .product-pm .workbuddy .superpowers .worktrees opc-doc)
          if [ -n "$tracked" ]; then
            echo "::error::AI 工具临时状态目录不得纳入版本管理（见 .gitignore / CLAUDE.md §7）。违规文件："
            echo "$tracked"
            exit 1
          fi
          echo "OK: 无被跟踪的 AI 工具状态文件"

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install CJK font (resume PDF verify)
        run: sudo apt-get update -q && sudo apt-get install -y -q fonts-noto-cjk

      - name: PG schema drift check
        working-directory: services/api
        run: pnpm db:pg:sync:check

      - name: Lint
        run: |
          pnpm --filter @ai-job-print/api lint
          pnpm --filter @ai-job-print/kiosk lint
          pnpm --filter @ai-job-print/admin lint
          pnpm --filter @ai-job-print/partner lint

      - name: Typecheck
        run: |
          pnpm --filter @ai-job-print/shared typecheck
          pnpm --filter @ai-job-print/api typecheck
          pnpm --filter @ai-job-print/kiosk typecheck
          pnpm --filter @ai-job-print/admin typecheck
          pnpm --filter @ai-job-print/partner typecheck
          pnpm --filter terminal-agent typecheck

      - name: Build
        # 三端生产构建门禁要求 VITE_API_MODE=http；Kiosk 还要求数字人构建期开关，
        # 避免 /assistant 未启用数字人通话入口后静默回落文字助手。
        env:
          VITE_API_MODE: http
          VITE_API_BASE_URL: /api/v1
          VITE_USE_TRTC_CALL: 'true'
          VITE_TERMINAL_ID: KSK-001
        run: |
          pnpm --filter @ai-job-print/api build
          pnpm build:kiosk:production
          pnpm --filter @ai-job-print/admin build
          pnpm --filter @ai-job-print/partner build
          pnpm --filter terminal-agent build

      - name: Prepare fresh SQLite db (schema push)
        working-directory: services/api
        run: npx prisma db push --accept-data-loss

      - name: Verify suites
        # ⚠ 必须串行(逐行顺序执行)。这些 verify 共享同一个 SQLite dev.db,
        # 并行(& / run-p / concurrently)会触发 SQLite 写锁超时,可能让脚本的
        # finally 清理失败,残留 approved+published 测试招聘会泄漏到公开前台
        # (/campus、/job-fairs)。各脚本已用稳定 tag 在下次运行前预清残留,
        # 但前提仍是串行,切勿改成并行。
        env:
          VITE_API_MODE: http
          VITE_API_BASE_URL: /api/v1
          VITE_USE_TRTC_CALL: 'true'
          VITE_TERMINAL_ID: KSK-001
        run: |
          pnpm --filter @ai-job-print/kiosk verify:assistant-trtc-guard
          pnpm --filter @ai-job-print/kiosk verify:production-real-services
          pnpm --filter @ai-job-print/kiosk verify:print-confirm-honest
          pnpm --filter @ai-job-print/kiosk verify:member-print-orders-ui
          pnpm --filter @ai-job-print/kiosk verify:profile-inkpaper-home
          pnpm --filter @ai-job-print/kiosk verify:profile-ai-records-inkpaper
          pnpm --filter @ai-job-print/kiosk verify:kiosk-shell-active-nav
          pnpm --filter @ai-job-print/kiosk verify:prod-build-config
          pnpm --filter @ai-job-print/kiosk verify:job-info-ui
          pnpm --filter @ai-job-print/kiosk verify:job-ai-ui
          pnpm --filter @ai-job-print/kiosk verify:job-ai-history-privacy-ui
          pnpm --filter @ai-job-print/admin verify:job-ai-ops-dashboard-ui
          pnpm --filter @ai-job-print/partner verify:job-quality-dashboard-ui
          pnpm --filter @ai-job-print/partner verify:excel-template-download-ui
          pnpm --filter @ai-job-print/kiosk verify:jobfair-ui
          pnpm --filter @ai-job-print/kiosk verify:smart-campus-ui
          pnpm --filter @ai-job-print/api verify:production-db-guard
          pnpm --filter @ai-job-print/api verify:production-runtime-gates
          pnpm --filter @ai-job-print/api verify:deploy-data-safety-gate
          pnpm --filter @ai-job-print/api verify:production-real-services
          pnpm --filter @ai-job-print/api verify:partner-smart-campus
          pnpm --filter @ai-job-print/api verify:partner-excel-template
          pnpm --filter @ai-job-print/api verify:partner-edit
          pnpm --filter @ai-job-print/api verify:partner-org-self
          pnpm --filter @ai-job-print/api verify:print-jobs
          pnpm --filter @ai-job-print/api verify:print-scan-first-release
          pnpm --filter @ai-job-print/api verify:order
          pnpm --filter @ai-job-print/api verify:pricing
          pnpm --filter @ai-job-print/api verify:member-print-orders
          pnpm --filter @ai-job-print/api verify:materials-processing
          pnpm --filter @ai-job-print/api verify:payment-flow
          pnpm --filter @ai-job-print/api verify:kiosk-cashier-ui
          pnpm --filter @ai-job-print/api verify:screensaver-content
          pnpm --filter @ai-job-print/api verify:audit-logs
          pnpm --filter @ai-job-print/api verify:ai-config
          pnpm --filter @ai-job-print/api verify:job-review
          pnpm --filter @ai-job-print/api verify:jobfair-review
          pnpm --filter @ai-job-print/api verify:jobfair-venue-guide
          pnpm --filter @ai-job-print/api verify:jobfair-campus-priority
          pnpm --filter @ai-job-print/api verify:public-fair-demo-guard
          pnpm --filter @ai-job-print/api verify:admin-fairs
          pnpm --filter @ai-job-print/api verify:fair-info-fields
          pnpm --filter @ai-job-print/api verify:fair-company-positions
          pnpm --filter @ai-job-print/api verify:admin-orgs
          pnpm --filter @ai-job-print/api verify:resume-generate
          pnpm --filter @ai-job-print/api verify:resume-export-formats
          pnpm --filter @ai-job-print/api verify:resume-layout-export
          pnpm --filter @ai-job-print/api verify:resume-layout-adjust
          pnpm --filter @ai-job-print/api verify:resume-template-fill
          pnpm --filter @ai-job-print/api verify:resume-optimize
          pnpm --filter @ai-job-print/api verify-real-resume-diagnosis
          pnpm --filter @ai-job-print/api verify:ai-result-ownership
          pnpm --filter @ai-job-print/api verify:llm-guard
          pnpm --filter @ai-job-print/api verify:member-assets-c2d
          pnpm --filter @ai-job-print/api verify:benefit-redemption
          pnpm --filter @ai-job-print/api verify:ocr-baidu
          pnpm --filter @ai-job-print/api verify:mock-interview
          pnpm --filter @ai-job-print/api verify:job-fit
          pnpm --filter @ai-job-print/api verify:job-ai
          pnpm --filter @ai-job-print/api verify:job-data-quality
          pnpm --filter @ai-job-print/api verify:job-ai-backend
          pnpm --filter @ai-job-print/api verify:job-ai-privacy
          pnpm --filter @ai-job-print/api verify:job-ai-ops-dashboard
          pnpm --filter @ai-job-print/api verify:job-customer-sample-readiness
          pnpm --filter @ai-job-print/api verify:job-info-ai-real-acceptance
          pnpm --filter @ai-job-print/api verify:career-plan
          pnpm --filter @ai-job-print/api verify:activity-logs
          pnpm --filter @ai-job-print/api verify:companies
          pnpm --filter @ai-job-print/api verify:resume-extraction

  # ── PostgreSQL 生产底座验证(第四阶段)──────────────────────────────────────
  # 全新 PG 空库:schema 同步校验 → migrate deploy → seed → 核心 verify。
  # 未通过此 job 不得宣称生产数据库已支持 PostgreSQL。
  postgres-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ai_job_print_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ai_job_print_ci
      POSTGRES_URL: postgresql://ci:ci@localhost:5432/ai_job_print_ci
      REDIS_URL: redis://localhost:6379
      FILE_SIGNING_SECRET: ci-only-test-signing-secret-0123456789abcdef
      FILE_STORAGE_DIR: /tmp/ci-file-storage
      FILE_STORAGE_DRIVER: local
      AI_PROVIDER: mock
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdef
      SECRET_ENCRYPTION_KEY: ci-only-encryption-key-0123456789abcdef
      SMS_PROVIDER: log
      TERMINAL_ADMIN_SECRET: ci-only-terminal-admin-secret
      TERMINAL_ACTION_TOKEN_SECRET: ci-only-terminal-action-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Install CJK font (PDF verify)
        run: sudo apt-get update -q && sudo apt-get install -y -q fonts-noto-cjk
      - name: PG schema drift check
        working-directory: services/api
        run: pnpm db:pg:sync:check
      - name: Generate clients (SQLite types + PG runtime)
        working-directory: services/api
        # create-client.ts 静态 import SQLite client(类型统一);两套产物都需生成
        run: |
          npx prisma generate
          pnpm db:pg:generate
      - name: Migrate deploy on fresh PG
        working-directory: services/api
        run: pnpm db:pg:deploy
      - name: Seed on PG
        working-directory: services/api
        run: |
          node -r @swc-node/register prisma/seed.ts
          node -r @swc-node/register prisma/seed-fairs.ts
      - name: Core verify suites on PG
        run: |
          pnpm --filter @ai-job-print/api verify:jobfair-venue-guide
          pnpm --filter @ai-job-print/api verify:admin-fairs
          pnpm --filter @ai-job-print/api verify:resume-layout-export
          pnpm --filter @ai-job-print/api verify:resume-layout-adjust
          pnpm --filter @ai-job-print/api verify:resume-template-fill
          pnpm --filter @ai-job-print/api verify:resume-optimize
          pnpm --filter @ai-job-print/api verify:job-fit
          pnpm --filter @ai-job-print/api verify:career-plan
          pnpm --filter @ai-job-print/api verify:activity-logs
          pnpm --filter @ai-job-print/api verify:companies
          pnpm --filter @ai-job-print/api verify:mock-interview
          pnpm --filter @ai-job-print/api verify:member-assets-c2d
          pnpm --filter @ai-job-print/api verify:print-jobs
          pnpm --filter @ai-job-print/api verify:order
          pnpm --filter @ai-job-print/api verify:pricing
          pnpm --filter @ai-job-print/api verify:member-print-orders
          pnpm --filter @ai-job-print/api verify:materials-processing
          pnpm --filter @ai-job-print/api verify:payment-flow
          pnpm --filter @ai-job-print/api verify:kiosk-cashier-ui
          pnpm --filter @ai-job-print/api verify:job-review
          pnpm --filter @ai-job-print/api verify:audit-logs
