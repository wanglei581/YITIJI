# 工程基线 CI:每次推送/PR 在干净环境验证 frozen-lockfile 安装、lint、typecheck、
# build 与核心 verify 套件。verify 在全新 SQLite 库(prisma db push)上自建测试数据、
# 自清理;PDF 导出验证依赖系统 CJK 字体(fonts-noto-cjk)。
#
# 注意:不在 CI 中放任何真实凭证;FILE_SIGNING_SECRET 为 CI 专用测试值,
# FILE_STORAGE_DRIVER 强制 local,绝不触达生产 COS。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      # C-2D 会员资产 E2E（verify:member-assets-c2d）需要 Redis：
      # 短信验证码 / 频控 / 会员会话全部落 Redis（dev SMS provider = log）。
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: file:./prisma/dev.db
      FILE_SIGNING_SECRET: ci-only-test-signing-secret-0123456789abcdef
      FILE_STORAGE_DIR: /tmp/ci-file-storage
      FILE_STORAGE_DRIVER: local
      AI_PROVIDER: mock
      # 以下均为 CI 专用测试值，不是真实凭证
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdef
      SECRET_ENCRYPTION_KEY: ci-only-encryption-key-0123456789abcdef
      REDIS_URL: redis://127.0.0.1:6379
      SMS_PROVIDER: log
      # terminals.service 在模块加载期 requireEnv 这两项（verify 启动完整 AppModule 需要）
      TERMINAL_ADMIN_SECRET: ci-only-terminal-admin-secret
      TERMINAL_ACTION_TOKEN_SECRET: ci-only-terminal-action-secret
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install CJK font (resume PDF verify)
        run: sudo apt-get update -q && sudo apt-get install -y -q fonts-noto-cjk

      - name: PG schema drift check
        working-directory: services/api
        run: pnpm db:pg:sync:check

      - name: Lint
        run: |
          pnpm --filter @ai-job-print/api lint
          pnpm --filter @ai-job-print/kiosk lint
          pnpm --filter @ai-job-print/admin lint
          pnpm --filter @ai-job-print/partner lint

      - name: Typecheck
        run: |
          pnpm --filter @ai-job-print/shared typecheck
          pnpm --filter @ai-job-print/api typecheck
          pnpm --filter @ai-job-print/kiosk typecheck
          pnpm --filter @ai-job-print/admin typecheck
          pnpm --filter @ai-job-print/partner typecheck
          pnpm --filter terminal-agent typecheck

      - name: Build
        # 三端生产构建门禁要求 VITE_API_MODE=http（见各 app vite.config.ts 的 assertProdApiMode）；
        # 这里显式设上，既让构建通过，也让 CI 顺带校验生产产物为 http 模式（非 mock 假数据）。
        env:
          VITE_API_MODE: http
          VITE_API_BASE_URL: /api/v1
        run: |
          pnpm --filter @ai-job-print/api build
          pnpm --filter @ai-job-print/kiosk build
          pnpm --filter @ai-job-print/admin build
          pnpm --filter @ai-job-print/partner build
          pnpm --filter terminal-agent build

      - name: Prepare fresh SQLite db (schema push)
        working-directory: services/api
        run: npx prisma db push --accept-data-loss

      - name: Verify suites
        run: |
          pnpm --filter @ai-job-print/kiosk verify:jobfair-ui
          pnpm --filter @ai-job-print/api verify:print-jobs
          pnpm --filter @ai-job-print/api verify:screensaver-content
          pnpm --filter @ai-job-print/api verify:audit-logs
          pnpm --filter @ai-job-print/api verify:ai-config
          pnpm --filter @ai-job-print/api verify:job-review
          pnpm --filter @ai-job-print/api verify:jobfair-venue-guide
          pnpm --filter @ai-job-print/api verify:admin-fairs
          pnpm --filter @ai-job-print/api verify:fair-info-fields
          pnpm --filter @ai-job-print/api verify:fair-company-positions
          pnpm --filter @ai-job-print/api verify:admin-orgs
          pnpm --filter @ai-job-print/api verify:resume-generate
          pnpm --filter @ai-job-print/api verify:resume-optimize
          pnpm --filter @ai-job-print/api verify-real-resume-diagnosis
          pnpm --filter @ai-job-print/api verify:ai-result-ownership
          pnpm --filter @ai-job-print/api verify:llm-guard
          pnpm --filter @ai-job-print/api verify:member-assets-c2d
          pnpm --filter @ai-job-print/api verify:ocr-baidu
          pnpm --filter @ai-job-print/api verify:mock-interview
          pnpm --filter @ai-job-print/api verify:job-fit
          pnpm --filter @ai-job-print/api verify:career-plan
          pnpm --filter @ai-job-print/api verify:activity-logs
          pnpm --filter @ai-job-print/api verify:companies
          pnpm --filter @ai-job-print/api verify:resume-extraction

  # ── PostgreSQL 生产底座验证(第四阶段)──────────────────────────────────────
  # 全新 PG 空库:schema 同步校验 → migrate deploy → seed → 核心 verify。
  # 未通过此 job 不得宣称生产数据库已支持 PostgreSQL。
  postgres-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ai_job_print_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ai_job_print_ci
      POSTGRES_URL: postgresql://ci:ci@localhost:5432/ai_job_print_ci
      REDIS_URL: redis://localhost:6379
      FILE_SIGNING_SECRET: ci-only-test-signing-secret-0123456789abcdef
      FILE_STORAGE_DIR: /tmp/ci-file-storage
      FILE_STORAGE_DRIVER: local
      AI_PROVIDER: mock
      JWT_SECRET: ci-only-jwt-secret-0123456789abcdef
      SECRET_ENCRYPTION_KEY: ci-only-encryption-key-0123456789abcdef
      SMS_PROVIDER: log
      TERMINAL_ADMIN_SECRET: ci-only-terminal-admin-secret
      TERMINAL_ACTION_TOKEN_SECRET: ci-only-terminal-action-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Install CJK font (PDF verify)
        run: sudo apt-get update -q && sudo apt-get install -y -q fonts-noto-cjk
      - name: PG schema drift check
        working-directory: services/api
        run: pnpm db:pg:sync:check
      - name: Generate clients (SQLite types + PG runtime)
        working-directory: services/api
        # create-client.ts 静态 import SQLite client(类型统一);两套产物都需生成
        run: |
          npx prisma generate
          pnpm db:pg:generate
      - name: Migrate deploy on fresh PG
        working-directory: services/api
        run: pnpm db:pg:deploy
      - name: Seed on PG
        working-directory: services/api
        run: |
          node -r @swc-node/register prisma/seed.ts
          node -r @swc-node/register prisma/seed-fairs.ts
      - name: Core verify suites on PG
        run: |
          pnpm --filter @ai-job-print/api verify:jobfair-venue-guide
          pnpm --filter @ai-job-print/api verify:admin-fairs
          pnpm --filter @ai-job-print/api verify:resume-optimize
          pnpm --filter @ai-job-print/api verify:job-fit
          pnpm --filter @ai-job-print/api verify:career-plan
          pnpm --filter @ai-job-print/api verify:activity-logs
          pnpm --filter @ai-job-print/api verify:companies
          pnpm --filter @ai-job-print/api verify:mock-interview
          pnpm --filter @ai-job-print/api verify:member-assets-c2d
          pnpm --filter @ai-job-print/api verify:print-jobs
          pnpm --filter @ai-job-print/api verify:job-review
          pnpm --filter @ai-job-print/api verify:audit-logs

