# 工程基线 CI:每次推送/PR 在干净环境验证 frozen-lockfile 安装、lint、typecheck、
# build 与核心 verify 套件。verify 在全新 SQLite 库(prisma db push)上自建测试数据、
# 自清理;PDF 导出验证依赖系统 CJK 字体(fonts-noto-cjk)。
#
# 注意:不在 CI 中放任何真实凭证;FILE_SIGNING_SECRET 为 CI 专用测试值,
# FILE_STORAGE_DRIVER 强制 local,绝不触达生产 COS。
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: file:./prisma/dev.db
      FILE_SIGNING_SECRET: ci-only-test-signing-secret-0123456789abcdef
      FILE_STORAGE_DIR: /tmp/ci-file-storage
      FILE_STORAGE_DRIVER: local
      AI_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install CJK font (resume PDF verify)
        run: sudo apt-get update -q && sudo apt-get install -y -q fonts-noto-cjk

      - name: Lint
        run: |
          pnpm --filter @ai-job-print/api lint
          pnpm --filter @ai-job-print/kiosk lint
          pnpm --filter @ai-job-print/admin lint
          pnpm --filter @ai-job-print/partner lint

      - name: Typecheck
        run: |
          pnpm --filter @ai-job-print/shared typecheck
          pnpm --filter @ai-job-print/api typecheck
          pnpm --filter @ai-job-print/kiosk typecheck
          pnpm --filter @ai-job-print/admin typecheck
          pnpm --filter @ai-job-print/partner typecheck
          pnpm --filter terminal-agent typecheck

      - name: Build
        run: |
          pnpm --filter @ai-job-print/api build
          pnpm --filter @ai-job-print/kiosk build
          pnpm --filter @ai-job-print/admin build
          pnpm --filter @ai-job-print/partner build
          pnpm --filter terminal-agent build

      - name: Prepare fresh SQLite db (schema push)
        working-directory: services/api
        run: npx prisma db push --accept-data-loss

      - name: Verify suites
        run: |
          pnpm --filter @ai-job-print/kiosk verify:jobfair-ui
          pnpm --filter @ai-job-print/api verify:jobfair-venue-guide
          pnpm --filter @ai-job-print/api verify:admin-fairs
          pnpm --filter @ai-job-print/api verify:admin-orgs
          pnpm --filter @ai-job-print/api verify:resume-generate
          pnpm --filter @ai-job-print/api verify:resume-optimize
          pnpm --filter @ai-job-print/api verify-real-resume-diagnosis
          pnpm --filter @ai-job-print/api verify:ai-result-ownership
          pnpm --filter @ai-job-print/api verify:llm-guard
