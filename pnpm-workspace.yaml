packages:
  - 'apps/*'
  - 'packages/*'
  - 'services/*'
# Workspace-level overrides are the single source of truth for pnpm 9+.
overrides:
  qs: 6.15.2
  '@hono/node-server': 2.0.4
  uuid: 14.0.0
allowBuilds:
  '@alicloud/openapi-core': true
  '@nestjs/core': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
