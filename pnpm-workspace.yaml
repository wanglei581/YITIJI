packages:
  - 'apps/*'
  - 'packages/*'
  - 'services/*'
# Keep in sync with package.json pnpm.overrides. Server pnpm 9 reads package.json,
# while local/newer pnpm reads this workspace-level overrides block.
overrides:
  qs: 6.15.2
  '@hono/node-server': 2.0.4
  uuid: 14.0.0
allowBuilds:
  '@alicloud/openapi-core': true
  '@nestjs/core': true
  '@prisma/engines': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
