<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI求职打印服务终端 · 浏览与跳转记录</title>
<link rel="stylesheet" href="shared.css">
<style>
  .summary { display: flex; align-items: center; gap: 22px; padding: 20px 30px; }
  .summary .s-ico { width: 60px; height: 60px; flex: none; border-radius: 15px; display: grid; place-items: center; background: var(--slate-soft); color: var(--slate-deep); }
  .summary .s-ico svg { width: 32px; height: 32px; }
  .summary .s-main p { font-size: 20px; color: var(--muted); }
  .summary .s-main b { display: block; margin-top: 2px; font-size: 38px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .summary .s-note { flex: 1; font-size: 18px; color: var(--muted); line-height: 1.5; padding-left: 8px; }
  .summary .s-mini { display: flex; gap: 12px; }
  .summary .s-mini span { font-size: 18px; color: var(--muted); background: var(--paper); border: 1px solid var(--line); border-radius: 999px; padding: 8px 18px; }
  .list { display: flex; flex-direction: column; gap: 13px; }
  .list .row-item { min-height: 104px; padding: 18px 26px; }
  .f-ico { width: 54px; height: 54px; flex: none; border-radius: 13px; display: grid; place-items: center; background: var(--accent-soft, var(--slate-soft)); color: var(--accent-deep, var(--slate-deep)); }
  .f-ico svg { width: 28px; height: 28px; }
  .t-chip { flex: none; font-size: 15.5px; font-weight: 600; padding: 5px 13px; border-radius: 999px; background: var(--paper); border: 1px solid var(--line); color: var(--muted); white-space: nowrap; }
  .content > .notice { margin-top: auto; }
</style>
</head>
<body>
<div id="stage">

  <!-- 顶部状态栏 -->
  <header class="topbar">
    <div class="brand"><b>就业服务大厅 · 01号机</b><span>AI求职打印服务终端</span></div>
    <div class="right">
      <span class="clock" id="clock">2026年7月17日 10:24</span>
      <span class="status-chip"><span class="dot"></span>打印机正常 · A4纸充足</span>
    </div>
  </header>

  <!-- 页头 -->
  <div class="pagehead a-teal">
    <button class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M15 5l-7 7 7 7"/></svg>
      返回
    </button>
    <div class="titles">
      <h1>浏览与跳转记录</h1>
      <p>本人浏览过的、以及打开过来源平台 / 官方入口的记录(仅本人可见)</p>
    </div>
  </div>

  <main class="content a-teal">

    <!-- 概览 -->
    <section class="card accented a-slate summary">
      <span class="s-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg></span>
      <div class="s-main"><p>访问足迹</p><b>12</b></div>
      <div class="s-note">只记录浏览与打开来源入口动作,不记录投递或预约结果</div>
      <div class="s-mini"><span>浏览 8</span><span>跳转 4</span></div>
    </section>

    <!-- 两 Tab -->
    <div class="filter-bar">
      <button class="f-chip on">浏览记录 8</button>
      <button class="f-chip">外部跳转记录 4</button>
    </div>

    <!-- 浏览记录列表(点击回到对应详情页) -->
    <div class="list">

      <button class="row-item a-teal">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>前端开发工程师 · 杭州云栖科技</b>
          <div class="r-sub"><span>浏览 · 岗位 · 市人才服务中心 · 今天 10:18</span></div>
        </div>
        <span class="t-chip">岗位</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-teal">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>行政专员 · 明州置业集团</b>
          <div class="r-sub"><span>浏览 · 岗位 · 甬工惠服务平台 · 今天 10:12</span></div>
        </div>
        <span class="t-chip">岗位</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-wheat">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>2026 年夏季综合招聘会</b>
          <div class="r-sub"><span>浏览 · 招聘会 · 市人力资源和社会保障局 · 今天 09:56</span></div>
        </div>
        <span class="t-chip">招聘会</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-clay">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>杭州云栖科技有限公司</b>
          <div class="r-sub"><span>浏览 · 企业 · 市人才服务中心 · 今天 09:48</span></div>
        </div>
        <span class="t-chip">企业</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-slate">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>高校毕业生一次性求职补贴申领指引</b>
          <div class="r-sub"><span>浏览 · 政策 · 07-16 20:32</span></div>
        </div>
        <span class="t-chip">政策</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-wheat">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>青禾电子商务(3 号展位)</b>
          <div class="r-sub"><span>浏览 · 参展企业 · 高校毕业生专场招聘会 · 07-16 19:40</span></div>
        </div>
        <span class="t-chip">参展企业</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-wheat">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>高校毕业生专场招聘会</b>
          <div class="r-sub"><span>浏览 · 招聘会 · 市大学生就业指导中心 · 07-16 19:35</span></div>
        </div>
        <span class="t-chip">招聘会</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

      <button class="row-item a-teal">
        <span class="f-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></span>
        <div class="r-main">
          <b>电商运营(实习) · 青禾电子商务</b>
          <div class="r-sub"><span>浏览 · 岗位 · 市人才服务中心 · 07-15 10:05</span></div>
        </div>
        <span class="t-chip">岗位</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 5l7 7-7 7"/></svg>
      </button>

    </div>

    <!-- 跳转 Tab 说明:切到「外部跳转记录」后行格式为「打开岗位来源入口 / 官方入口 · 类型 · 时间」 -->
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
      切换到「外部跳转记录」查看本人打开岗位 / 招聘会 / 政策来源平台或官方入口的 4 条记录。
    </div>

    <!-- 提示 -->
    <div class="notice">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16.5v.5"/></svg>
      仅记录本人浏览与打开来源入口的行为;来源机构、同步时间与外部ID在对应详情页查看。投递 / 预约结果以来源平台为准,本系统不记录也不参与。
    </div>
  </main>

  <!-- 底部导航:我的激活 -->
  <nav class="navbar">
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11l9-7 9 7M5 10v10h5v-6h4v6h5V10"/></svg>
      首页
    </button>
    <button class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 12a8 8 0 01-8 8H4l2-3a8 8 0 1115-5z"/><path d="M9 12h.01M13 12h.01M17 12h.01"/></svg>
      AI助手
    </button>
    <button class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg>
      我的
    </button>
  </nav>
</div>
<script src="shared.js"></script>
</body>
</html>
